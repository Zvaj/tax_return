<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Filing Option Selector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #01579b 0%, #0277bd 100%);
    color: white;
    padding: 20px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.3px; }
  header p { font-size: 0.82rem; opacity: 0.85; margin-top: 4px; }
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 20px;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .panel {
    background: white;
    border-radius: 12px;
    padding: 22px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .panel-title {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #0277bd;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 2px solid #e1f5fe;
  }
  .input-group { margin-bottom: 20px; }
  .input-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 7px;
  }
  .input-label span { font-size: 0.875rem; font-weight: 600; color: #37474f; }
  .input-value {
    font-size: 0.875rem;
    font-weight: 700;
    color: #01579b;
    background: #e1f5fe;
    padding: 2px 8px;
    border-radius: 4px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: #e1f5fe;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #0277bd;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: transform 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #0277bd;
    cursor: pointer; border: none;
  }
  select {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid #b3e5fc;
    border-radius: 8px;
    font-size: 0.9rem;
    color: #37474f;
    background: white;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  select:focus { border-color: #0277bd; }
  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-item {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1.5px solid #b3e5fc;
    transition: background 0.15s, border-color 0.15s;
  }
  .radio-item:hover { background: #f0faff; border-color: #4fc3f7; }
  .radio-item input[type="radio"] {
    width: 16px; height: 16px;
    accent-color: #0277bd;
    cursor: pointer;
  }
  .radio-item span { font-size: 0.875rem; color: #455a64; font-weight: 500; }
  .checkbox-item-special {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1.5px solid #b3e5fc;
    transition: background 0.15s;
  }
  .checkbox-item-special:hover { background: #f0faff; }
  .checkbox-item-special input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: #0277bd;
    cursor: pointer;
  }
  .checkbox-item-special span { font-size: 0.875rem; color: #455a64; font-weight: 500; }
  /* Result cards */
  .results-list { display: flex; flex-direction: column; gap: 14px; }
  .result-card {
    border-radius: 10px;
    padding: 16px 18px;
    border: 2px solid;
    position: relative;
    transition: box-shadow 0.2s;
  }
  .result-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .result-card.best {
    background: #e8f5e9;
    border-color: #a5d6a7;
  }
  .result-card.good {
    background: #e3f2fd;
    border-color: #90caf9;
  }
  .result-card.may-not {
    background: #f5f5f5;
    border-color: #e0e0e0;
  }
  .result-card.not-avail {
    background: #f5f5f5;
    border-color: #e0e0e0;
    opacity: 0.7;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
    gap: 10px;
  }
  .card-name { font-size: 1rem; font-weight: 700; color: #263238; }
  .badge {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge.best { background: #2e7d32; color: white; }
  .badge.good { background: #1565c0; color: white; }
  .badge.may-not { background: #616161; color: white; }
  .badge.not-avail { background: #9e9e9e; color: white; }
  .card-desc { font-size: 0.855rem; color: #546e7a; line-height: 1.5; margin-bottom: 8px; }
  .card-visit { font-size: 0.82rem; color: #0277bd; font-weight: 600; }
  .no-results {
    text-align: center;
    padding: 30px;
    color: #90a4ae;
    font-size: 0.9rem;
  }
  @media (max-width: 780px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <h1>Free Filing Option Selector</h1>
  <p>Find the best free tax filing option for your situation</p>
</header>
<div class="layout">
  <div class="panel">
    <div class="panel-title">Your Situation</div>

    <div class="input-group">
      <div class="input-label">
        <span>Adjusted Gross Income (AGI)</span>
        <span class="input-value" id="agiDisplay">$45,000</span>
      </div>
      <input type="range" id="agiSlider" min="0" max="150000" step="1000" value="45000">
    </div>

    <div class="input-group">
      <div class="input-label"><span>Filing Complexity</span></div>
      <select id="complexity">
        <option value="simple">Simple (W-2 only)</option>
        <option value="moderate">Moderate (1099s, HSA, student loans)</option>
        <option value="complex">Complex (self-employment, investments, rental)</option>
      </select>
    </div>

    <div class="input-group">
      <div class="input-label"><span>Your State</span></div>
      <select id="stateSelect"></select>
    </div>

    <div class="input-group">
      <div class="input-label"><span>Filing Preference</span></div>
      <div class="radio-group">
        <label class="radio-item">
          <input type="radio" name="preference" value="inperson">
          <span>I prefer in-person help</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="preference" value="online" checked>
          <span>I prefer online / self-service</span>
        </label>
      </div>
    </div>

    <div class="input-group">
      <label class="checkbox-item-special">
        <input type="checkbox" id="accessNeeds">
        <span>Disability, limited English, or other accessibility needs</span>
      </label>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Recommended Filing Options</div>
    <div class="results-list" id="resultsList">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<script>
(function() {
  const ALL_STATES = [
    ['AK','Alaska'],['AL','Alabama'],['AR','Arkansas'],['AZ','Arizona'],['CA','California'],
    ['CO','Colorado'],['CT','Connecticut'],['DC','Washington D.C.'],['DE','Delaware'],
    ['FL','Florida'],['GA','Georgia'],['HI','Hawaii'],['IA','Iowa'],['ID','Idaho'],
    ['IL','Illinois'],['IN','Indiana'],['KS','Kansas'],['KY','Kentucky'],['LA','Louisiana'],
    ['MA','Massachusetts'],['MD','Maryland'],['ME','Maine'],['MI','Michigan'],['MN','Minnesota'],
    ['MO','Missouri'],['MS','Mississippi'],['MT','Montana'],['NC','North Carolina'],
    ['ND','North Dakota'],['NE','Nebraska'],['NH','New Hampshire'],['NJ','New Jersey'],
    ['NM','New Mexico'],['NV','Nevada'],['NY','New York'],['OH','Ohio'],['OK','Oklahoma'],
    ['OR','Oregon'],['PA','Pennsylvania'],['RI','Rhode Island'],['SC','South Carolina'],
    ['SD','South Dakota'],['TN','Tennessee'],['TX','Texas'],['UT','Utah'],['VA','Virginia'],
    ['VT','Vermont'],['WA','Washington'],['WI','Wisconsin'],['WV','West Virginia'],['WY','Wyoming']
  ];

  const DIRECT_FILE_STATES = new Set([
    'AZ','CA','FL','MA','NV','NH','NY','SD','TN','TX','WA','WY',
    'PA','OR','NJ','NC','MN','ME','ID','CT','AK'
  ]);

  // Populate state dropdown
  const stateSelect = document.getElementById('stateSelect');
  ALL_STATES.forEach(([code, name]) => {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = name;
    if (code === 'CA') opt.selected = true;
    stateSelect.appendChild(opt);
  });

  function getInputs() {
    return {
      agi: parseFloat(document.getElementById('agiSlider').value) || 0,
      complexity: document.getElementById('complexity').value,
      state: document.getElementById('stateSelect').value,
      preference: document.querySelector('input[name="preference"]:checked').value,
      accessNeeds: document.getElementById('accessNeeds').checked
    };
  }

  function buildRecommendations(inp) {
    const { agi, complexity, state, preference, accessNeeds } = inp;
    const inDirectFileState = DIRECT_FILE_STATES.has(state);
    const results = [];

    // ---- IRS Direct File ----
    let dfStatus = null, dfDesc = '';
    if (!inDirectFileState) {
      dfStatus = 'not-avail';
      dfDesc = 'IRS Direct File is not yet available in your state for this filing season.';
    } else if (complexity === 'complex') {
      dfStatus = 'not-avail';
      dfDesc = 'Direct File supports simple to moderate returns only — complex situations (self-employment, rental income) are not yet supported.';
    } else if (agi <= 84000 && complexity === 'simple') {
      dfStatus = 'best';
      dfDesc = 'You qualify for IRS Direct File — the IRS\'s own free filing tool, with no upsell and no third-party data sharing.';
    } else if (agi <= 84000 && complexity === 'moderate') {
      dfStatus = 'good';
      dfDesc = 'Direct File may cover your situation. Support for 1099s and HSAs has expanded — confirm your specific forms are supported.';
    } else {
      dfStatus = 'may-not';
      dfDesc = 'Your AGI may exceed the $84,000 Direct File income threshold. Check IRS.gov for current eligibility.';
    }
    if (dfStatus !== 'not-avail') {
      results.push({ name: 'IRS Direct File', status: dfStatus, desc: dfDesc, visit: 'Visit: directfile.irs.gov' });
    } else {
      results.push({ name: 'IRS Direct File', status: 'not-avail', desc: dfDesc, visit: 'Visit: directfile.irs.gov' });
    }

    // ---- VITA ----
    let vitaStatus = null, vitaDesc = '';
    if (agi > 73000 && !accessNeeds) {
      vitaStatus = 'not-avail';
      vitaDesc = 'VITA is generally available for filers with AGI under $73,000. Your income may exceed the limit.';
    } else if (agi <= 67000 || accessNeeds) {
      vitaStatus = 'best';
      vitaDesc = accessNeeds
        ? 'VITA specializes in serving people with disabilities and limited English proficiency — volunteers are IRS-certified and provide free in-person help.'
        : 'You qualify for VITA — free in-person tax prep by IRS-certified volunteers at local community sites.';
    } else {
      vitaStatus = 'good';
      vitaDesc = 'VITA may be available for your income level. In-person assistance from IRS-certified volunteers at no cost.';
    }
    // Preference bump: if they prefer in-person and VITA is available, upgrade to best
    if (preference === 'inperson' && vitaStatus === 'good') vitaStatus = 'best';
    results.push({ name: 'VITA (Volunteer Income Tax Assistance)', status: vitaStatus, desc: vitaDesc, visit: 'Visit: IRS.gov/VITA' });

    // ---- AARP Tax-Aide ----
    let aarpStatus = preference === 'inperson' ? 'best' : 'good';
    let aarpDesc = preference === 'inperson'
      ? 'AARP Tax-Aide offers free in-person filing assistance with no age or income limit. Ideal for your preference for in-person help.'
      : 'AARP Tax-Aide is available to everyone — no age or income requirement. A reliable backup option with in-person and drop-off service.';
    results.push({ name: 'AARP Tax-Aide', status: aarpStatus, desc: aarpDesc, visit: 'Visit: aarpfoundation.org/taxaide' });

    // ---- IRS Free File (commercial partners) ----
    let iffStatus = null, iffDesc = '';
    if (complexity === 'complex') {
      iffStatus = 'may-not';
      iffDesc = 'IRS Free File (commercial) covers basic to moderate situations. Complex returns with self-employment or rental income may require an upgraded paid product.';
    } else if (agi > 84000) {
      iffStatus = 'may-not';
      iffDesc = 'IRS Free File Guided Edition is limited to AGI under $84,000. You may only access the Free File Fillable Forms, which have limited guidance.';
    } else if (preference === 'online') {
      iffStatus = 'best';
      iffDesc = 'You qualify for IRS Free File — multiple commercial software providers offer guided free filing for your income and complexity level.';
    } else {
      iffStatus = 'good';
      iffDesc = 'IRS Free File is available online from multiple commercial partners. A solid option even if you\'d prefer in-person, as a backup.';
    }
    results.push({ name: 'IRS Free File (Commercial Partners)', status: iffStatus, desc: iffDesc, visit: 'Visit: IRS.gov/freefile' });

    // ---- Cash App Taxes / FreeTaxUSA ----
    let freeStatus = null, freeDesc = '';
    if (complexity === 'complex' && preference === 'online') {
      freeStatus = 'best';
      freeDesc = 'FreeTaxUSA and Cash App Taxes support self-employment, investments, and rental income — completely free for federal returns. Excellent for complex filers who are online-savvy.';
    } else if (agi > 84000 && preference === 'online') {
      freeStatus = 'best';
      freeDesc = 'FreeTaxUSA and Cash App Taxes have no income cap — if you\'re above $84k and prefer self-service online filing, these are your best free options.';
    } else if (preference === 'online') {
      freeStatus = 'good';
      freeDesc = 'FreeTaxUSA and Cash App Taxes are fully free online options with no income limit. Good backup if other options don\'t fit.';
    } else {
      freeStatus = 'good';
      freeDesc = 'FreeTaxUSA and Cash App Taxes are strong online options with no income limit, though they require self-service filing without in-person support.';
    }
    results.push({ name: 'FreeTaxUSA / Cash App Taxes', status: freeStatus, desc: freeDesc, visit: 'Visit: FreeTaxUSA.com or CashApp.com/taxes' });

    // Sort: best → good → may-not → not-avail
    const order = { best: 0, good: 1, 'may-not': 2, 'not-avail': 3 };
    results.sort((a, b) => order[a.status] - order[b.status]);
    return results;
  }

  function badgeLabel(status) {
    if (status === 'best') return 'Best Match';
    if (status === 'good') return 'Good Option';
    if (status === 'may-not') return 'May Not Qualify';
    return 'Not Available';
  }

  function render() {
    const inp = getInputs();
    const recs = buildRecommendations(inp);
    const container = document.getElementById('resultsList');
    container.innerHTML = '';

    recs.forEach(rec => {
      const card = document.createElement('div');
      card.className = 'result-card ' + rec.status;
      card.innerHTML = `
        <div class="card-top">
          <div class="card-name">${rec.name}</div>
          <span class="badge ${rec.status}">${badgeLabel(rec.status)}</span>
        </div>
        <div class="card-desc">${rec.desc}</div>
        <div class="card-visit">${rec.visit}</div>
      `;
      container.appendChild(card);
    });
  }

  document.getElementById('agiSlider').addEventListener('input', () => {
    const v = parseFloat(document.getElementById('agiSlider').value) || 0;
    document.getElementById('agiDisplay').textContent = '$' + v.toLocaleString();
    render();
  });
  document.getElementById('complexity').addEventListener('change', render);
  document.getElementById('stateSelect').addEventListener('change', render);
  document.querySelectorAll('input[name="preference"]').forEach(r => r.addEventListener('change', render));
  document.getElementById('accessNeeds').addEventListener('change', render);

  render();
})();
</script>
</body>
</html>
